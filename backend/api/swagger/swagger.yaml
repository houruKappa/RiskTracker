  # ── Reports ─────────────────────────────────────────────
  /api/v1/reports/summary:
    get:
      summary: Get report summary
      description: Returns aggregate stats (total risks, CMs, overdue, etc.)
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSummary'

  /api/v1/reports/detail:
    get:
      summary: Get detailed report (paginated)
      description: |
        Returns paginated risks with countermeasure details, statistics,
        and overdue breakdown. Supports filtering by object, owner, assignee,
        status, date range, and search.
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: target_id
          in: query
          schema:
            type: string
        - name: owner_id
          in: query
          schema:
            type: string
        - name: assignee_id
          in: query
          schema:
            type: string
        - name: risk_ids
          in: query
          schema:
            type: string
          description: Comma-separated risk IDs for selection mode
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RiskStatus'
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReport'

  # ── Audit Logs ──────────────────────────────────────────
  /api/v1/logs:
    get:
      summary: List audit logs (admin, paginated)
      tags: [Audit Logs]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [RISK, RISK_CAUSE, RISK_CONSEQUENCE, COUNTERMEASURE, RISK_OBJECT, USER]
        - name: action_type
          in: query
          schema:
            type: string
            enum: [CREATE, UPDATE, DELETE]
        - name: user_id
          in: query
          schema:
            type: string
        - name: user_email
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogs'
        '403':
          description: Forbidden

