openapi: 3.0.3
info:
  title: RiskTracker API
  description: |
    Risk Management System API.

    ## Authentication
    All endpoints except `/health` and `/api/v1/auth/login` require a JWT token
    in the `Authorization: Bearer <token>` header.

    ## Roles
    - **ADMIN** — full access to all resources, user management, audit logs.
    - **USER** — can manage risks they own, view objects/users, generate reports.

    ## RBAC
    Non-admin users can only access risks where they are the owner or an assignee
    of a countermeasure linked to that risk.
  version: 1.0.0
  contact:
    name: RiskTracker Team

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: System
    description: Health check
  - name: Auth
    description: Authentication and current user
  - name: Users
    description: User management (admin)
  - name: Risk Objects
    description: Risk objects (IT systems, projects, processes)
  - name: Risks
    description: Risk records with causes and consequences
  - name: Countermeasures
    description: Countermeasures linked to causes or consequences
  - name: Reports
    description: Reporting and analytics
  - name: Audit Logs
    description: Audit trail (admin only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    # ── User ──────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, full_name, password, role]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [USER, ADMIN]

    UpdateUserRequest:
      type: object
      required: [email, full_name, role]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]

    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 6

    # ── Enums ─────────────────────────────────────────────
    RiskLevel:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    RiskStatus:
      type: string
      enum: [IN_PROGRESS, COMPLETED]

    RiskObjectType:
      type: string
      enum: [IT_SYSTEM, PROJECT, PROCESS]

    CountermeasureTarget:
      type: string
      enum: [CAUSE, CONSEQUENCE]

    CountermeasureStatus:
      type: string
      enum: [PENDING, COMPLETED]

    # ── Risk Object ───────────────────────────────────────
    RiskObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        object_type:
          $ref: '#/components/schemas/RiskObjectType'
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateObjectRequest:
      type: object
      required: [name, object_type]
      properties:
        name:
          type: string
        object_type:
          $ref: '#/components/schemas/RiskObjectType'
        description:
          type: string

    # ── Risk Cause / Consequence ──────────────────────────
    RiskCause:
      type: object
      properties:
        id:
          type: string
          format: uuid
        risk_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        probability:
          $ref: '#/components/schemas/RiskLevel'
        created_at:
          type: string
          format: date-time

    RiskConsequence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        risk_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        probability:
          $ref: '#/components/schemas/RiskLevel'
        created_at:
          type: string
          format: date-time

    AddCauseRequest:
      type: object
      required: [name, probability]
      properties:
        name:
          type: string
        description:
          type: string
        probability:
          $ref: '#/components/schemas/RiskLevel'

    AddConsequenceRequest:
      type: object
      required: [name, probability]
      properties:
        name:
          type: string
        description:
          type: string
        probability:
          $ref: '#/components/schemas/RiskLevel'

    # ── Risk ──────────────────────────────────────────────
    Risk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/RiskStatus'
        title:
          type: string
        target_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        probability:
          $ref: '#/components/schemas/RiskLevel'
        impact:
          $ref: '#/components/schemas/RiskLevel'
        financial_loss:
          type: string
          nullable: true
        reputational_loss:
          $ref: '#/components/schemas/RiskLevel'
          nullable: true
        legal_consequences:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        comment:
          type: string
          nullable: true
        max_cause_probability:
          $ref: '#/components/schemas/RiskLevel'
          nullable: true
        max_consequence_probability:
          $ref: '#/components/schemas/RiskLevel'
          nullable: true
        causes:
          type: array
          items:
            $ref: '#/components/schemas/RiskCause'
        consequences:
          type: array
          items:
            $ref: '#/components/schemas/RiskConsequence'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRiskRequest:
      type: object
      required: [title, target_id, owner_id, probability, impact]
      properties:
        title:
          type: string
        target_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        probability:
          $ref: '#/components/schemas/RiskLevel'
        impact:
          $ref: '#/components/schemas/RiskLevel'
        financial_loss:
          type: string
        reputational_loss:
          $ref: '#/components/schemas/RiskLevel'
        legal_consequences:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        causes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              probability:
                $ref: '#/components/schemas/RiskLevel'
        consequences:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              probability:
                $ref: '#/components/schemas/RiskLevel'

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/RiskStatus'

    PaginatedRisks:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Risk'
        total_count:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Countermeasure ────────────────────────────────────
    Countermeasure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        risk_id:
          type: string
          format: uuid
        target_type:
          $ref: '#/components/schemas/CountermeasureTarget'
        cause_id:
          type: string
          format: uuid
          nullable: true
        consequence_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        assignee_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CountermeasureStatus'
        deadline:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateCountermeasureRequest:
      type: object
      required: [risk_id, target_type, description, assignee_id, deadline]
      properties:
        risk_id:
          type: string
          format: uuid
        target_type:
          $ref: '#/components/schemas/CountermeasureTarget'
        cause_id:
          type: string
          format: uuid
        consequence_id:
          type: string
          format: uuid
        description:
          type: string
        assignee_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CountermeasureStatus'
        deadline:
          type: string
          format: date-time

    UpdateCountermeasureRequest:
      type: object
      required: [description, assignee_id, deadline]
      properties:
        description:
          type: string
        assignee_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CountermeasureStatus'
        deadline:
          type: string
          format: date-time

    # ── Reports ───────────────────────────────────────────
    ReportSummary:
      type: object
      properties:
        total_risks:
          type: integer
        in_progress_risks:
          type: integer
        completed_risks:
          type: integer
        total_countermeasures:
          type: integer
        completed_countermeasures:
          type: integer
        pending_countermeasures:
          type: integer
        overdue_countermeasures:
          type: integer
        expired_countermeasures:
          type: integer
        expiring_soon_countermeasures:
          type: integer

    CountermeasureReport:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        assignee_name:
          type: string
        assignee_id:
          type: string
        deadline:
          type: string
        status:
          $ref: '#/components/schemas/CountermeasureStatus'
        is_expired:
          type: boolean
        is_expiring_soon:
          type: boolean
        target_type:
          $ref: '#/components/schemas/CountermeasureTarget'

    ReportItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        target_name:
          type: string
        target_type:
          $ref: '#/components/schemas/RiskObjectType'
        owner_name:
          type: string
        owner_id:
          type: string
        status:
          $ref: '#/components/schemas/RiskStatus'
        probability:
          $ref: '#/components/schemas/RiskLevel'
        impact:
          $ref: '#/components/schemas/RiskLevel'
        max_cause_probability:
          $ref: '#/components/schemas/RiskLevel'
          nullable: true
        max_consequence_probability:
          $ref: '#/components/schemas/RiskLevel'
          nullable: true
        countermeasures:
          type: array
          items:
            $ref: '#/components/schemas/CountermeasureReport'
        created_at:
          type: string

    ReportStatistics:
      type: object
      properties:
        risks_total:
          type: integer
        risks_in_progress:
          type: integer
        risks_completed:
          type: integer
        countermeasures_total:
          type: integer
        countermeasures_completed:
          type: integer
        countermeasures_pending:
          type: integer
        countermeasures_overdue:
          type: integer
        overdue_details:
          type: array
          items:
            $ref: '#/components/schemas/OverdueCountermeasure'

    OverdueCountermeasure:
      type: object
      properties:
        risk_id:
          type: string
        risk_title:
          type: string
        countermeasure_id:
          type: string
        description:
          type: string
        assignee_name:
          type: string
        assignee_id:
          type: string
        deadline:
          type: string

    PaginatedReport:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportItem'
        total_count:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        statistics:
          $ref: '#/components/schemas/ReportStatistics'
        report_for_type:
          type: string
          description: "ALL | OWNER | ASSIGNEE | SELECTION"
        report_for_name:
          type: string

    # ── Audit Log ─────────────────────────────────────────
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        entity_type:
          type: string
          enum: [RISK, RISK_CAUSE, RISK_CONSEQUENCE, COUNTERMEASURE, RISK_OBJECT, USER]
        entity_id:
          type: string
        entity_name:
          type: string
        action_type:
          type: string
          enum: [CREATE, UPDATE, DELETE]
        changes:
          type: string
        changed_by_user_id:
          type: string
        changed_by_email:
          type: string
        timestamp:
          type: string
          format: date-time
        old_state:
          type: object
          nullable: true
        new_state:
          type: object
          nullable: true

    PaginatedAuditLogs:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        total_count:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Common ────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  # ── System ──────────────────────────────────────────────
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth ────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out

  /api/v1/users/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ── Users ───────────────────────────────────────────────
  /api/v1/users:
    get:
      summary: List users (any authenticated user)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /api/v1/admin/users:
    get:
      summary: List users (admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          description: Forbidden
    post:
      summary: Create user (admin)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Forbidden
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/users/{id}:
    put:
      summary: Update user (admin)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Forbidden

  /api/v1/admin/users/{id}/password:
    put:
      summary: Reset user password (admin)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
        '403':
          description: Forbidden

  # ── Risk Objects ────────────────────────────────────────
  /api/v1/objects:
    get:
      summary: List risk objects
      tags: [Risk Objects]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskObject'

  /api/v1/admin/objects:
    post:
      summary: Create risk object (admin)
      tags: [Risk Objects]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateObjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskObject'
        '403':
          description: Forbidden

  /api/v1/admin/objects/{id}:
    put:
      summary: Update risk object (admin)
      tags: [Risk Objects]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateObjectRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskObject'
        '403':
          description: Forbidden
    delete:
      summary: Delete risk object (admin)
      tags: [Risk Objects]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden

  # ── Risks ───────────────────────────────────────────────
  /api/v1/risks:
    get:
      summary: List risks (paginated)
      description: |
        Returns paginated risks. Non-admin users only see risks where they
        are the owner or an assignee of a countermeasure.
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RiskStatus'
        - name: target_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
          description: Search by title or ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRisks'
    post:
      summary: Create risk
      tags: [Risks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRiskRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'

  /api/v1/risks/{id}:
    get:
      summary: Get risk by ID
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '404':
          description: Not found
    put:
      summary: Update risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRiskRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'

  /api/v1/risks/{id}/status:
    patch:
      summary: Update risk status
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        '200':
          description: OK

  /api/v1/risks/{id}/causes:
    get:
      summary: List causes for a risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskCause'
    post:
      summary: Add cause to risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCauseRequest'
      responses:
        '201':
          description: Created

  /api/v1/risks/{id}/causes/{cause_id}:
    delete:
      summary: Delete a cause from a risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: cause_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Access denied

  /api/v1/risks/{id}/consequences:
    get:
      summary: List consequences for a risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskConsequence'
    post:
      summary: Add consequence to risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsequenceRequest'
      responses:
        '201':
          description: Created

  /api/v1/risks/{id}/consequences/{consequence_id}:
    delete:
      summary: Delete a consequence from a risk
      tags: [Risks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: consequence_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Access denied

