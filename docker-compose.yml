services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: risktracker
      POSTGRES_PASSWORD: risktracker
      POSTGRES_DB: risktracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U risktracker" ]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_DSN: postgres://risktracker:risktracker@db:5432/risktracker?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
      ENV: dev
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs

volumes:
  pgdata:
  go_mod_cache:
  go_build_cache:
